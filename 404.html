<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <meta name="description" content="404 - Page not found" />
    <meta name="theme-color" content="#2d3748" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <script src="/shared/theme.js"></script>
    <style>
      .life-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        opacity: 0.12;
        pointer-events: none;
      }

      .container {
        position: relative;
        z-index: 1;
      }

      .not-found-code {
        font-size: 4rem;
        font-weight: 700;
        opacity: 0.15;
        margin-bottom: 0.5rem;
      }

      .not-found-message {
        font-size: 1.1rem;
        color: var(--color-text-secondary);
        margin-bottom: 1.5rem;
      }

      .not-found-hint {
        font-size: 0.9rem;
        color: var(--color-text-muted);
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <canvas id="life-canvas" class="life-canvas" aria-hidden="true"></canvas>
    <div class="container">
      <header class="header compact">
        <h1>Page Not Found</h1>
      </header>

      <main id="main-content" class="main-content">
        <section class="section" style="text-align: center; padding: 2rem 0">
          <div class="not-found-code">404</div>
          <p class="not-found-message">The page you're looking for doesn't exist.</p>
          <a href="/" class="back-link">Go to homepage</a>
          <p class="not-found-hint">Conway's Game of Life runs in the background.</p>
        </section>
      </main>
    </div>
    <script src="/shared/nav.js"></script>
    <script src="/shared/life-background.js"></script>
  </body>
</html>
