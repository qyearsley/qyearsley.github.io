name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Debug environment
        run: |
          node --version
          npm --version
          cat package.json | head -5
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --registry https://registry.npmjs.org --loglevel verbose 2>&1 | tail -80
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
