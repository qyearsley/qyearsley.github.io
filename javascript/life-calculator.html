<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>How Long Have You Lived?</title>
    <meta
      name="description"
      content="Calculate how long you've been alive in various time units."
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <style>
      .results-table {
        width: auto;
        margin: 1rem auto;
      }

      .results-table td {
        padding: 0.5rem 1rem;
      }

      .numeric {
        text-align: right;
        font-weight: 600;
        font-family: monospace;
      }

      .progress-section {
        margin: 1.5rem 0;
        text-align: center;
      }

      .progress-bar-container {
        width: 100%;
        max-width: 400px;
        margin: 0.5rem auto;
        background: var(--color-bg-code, #f0f0f0);
        border-radius: 8px;
        overflow: hidden;
        height: 1.5rem;
      }

      .progress-bar-fill {
        height: 100%;
        background: var(--color-accent, #4a90d9);
        transition: width 1s linear;
        border-radius: 8px;
      }

      .progress-label {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }

      .progress-note {
        font-size: 0.85rem;
        color: var(--color-text-muted, #666);
        margin-top: 0.25rem;
      }

      .milestones {
        margin: 1.5rem auto;
        max-width: 500px;
        text-align: left;
      }

      .milestones h3 {
        text-align: center;
      }

      .milestone {
        padding: 0.4rem 0;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
      }

      .milestone-label {
        font-weight: 600;
      }

      .milestone-date {
        color: var(--color-text-muted, #666);
        white-space: nowrap;
      }

      .milestone-past {
        opacity: 0.7;
      }

      .milestone-next {
        border-left: 3px solid var(--color-accent, #4a90d9);
        padding-left: 0.75rem;
      }
    </style>
    <script src="/shared/theme.js"></script>
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="container">
      <header class="header">
        <h1>How Long Have You Lived?</h1>
        <p>Calculate the time elapsed since your birth in various units</p>
      </header>

      <main id="main-content" class="main-content">
        <nav class="breadcrumbs">
          <a href="/">Home</a>
          <span class="separator">/</span>
          <a href="/javascript/">Experiments</a>
          <span class="separator">/</span>
          <span class="current">Life Calculator</span>
        </nav>
        <section class="section">
          <form id="form" class="form-container">
            <div class="form-group">
              <label for="dateinput">When were you born?</label>
              <input type="date" id="dateinput" class="form-input" />
            </div>
            <button type="submit" class="submit-btn">Calculate</button>
            <div id="error" class="error-message" style="display: none"></div>
          </form>

          <div id="output" class="output-display" style="display: none">
            <div
              id="age-summary"
              style="font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem; text-align: center"
            ></div>

            <div id="progress-section" class="progress-section">
              <div class="progress-label" id="progress-label"></div>
              <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-bar"></div>
              </div>
              <div class="progress-note">Based on global average life expectancy of 73 years (WHO)</div>
            </div>

            <h3>You have now been alive for:</h3>
            <table class="results-table">
              <tr>
                <td class="numeric" id="years"></td>
                <td>years</td>
              </tr>
              <tr>
                <td class="numeric" id="months"></td>
                <td>months</td>
              </tr>
              <tr>
                <td class="numeric" id="weeks"></td>
                <td>weeks</td>
              </tr>
              <tr>
                <td class="numeric" id="days"></td>
                <td>days</td>
              </tr>
              <tr>
                <td class="numeric" id="hours"></td>
                <td>hours</td>
              </tr>
              <tr>
                <td class="numeric" id="seconds"></td>
                <td>seconds</td>
              </tr>
            </table>

            <div id="milestones" class="milestones"></div>
          </div>
        </section>
      </main>
    </div>

    <script>
      "use strict"

      const LIFE_EXPECTANCY_YEARS = 73

      const MILESTONES = [
        { seconds: 1e9, label: "1 billionth second" },
        { days: 10000, label: "10,000th day" },
        { seconds: 2e9, label: "2 billionth second" },
        { days: 20000, label: "20,000th day" },
        { seconds: 3e9, label: "3 billionth second" },
        { days: 30000, label: "30,000th day" },
      ]

      function addDays(date, n) {
        const d = new Date(date)
        d.setDate(d.getDate() + n)
        return d
      }

      function addSeconds(date, n) {
        return new Date(date.getTime() + n * 1000)
      }

      function formatDate(date) {
        return date.toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
        })
      }

      function computeMilestones(birthday) {
        const now = new Date()
        const results = []

        for (const m of MILESTONES) {
          const date = m.days ? addDays(birthday, m.days) : addSeconds(birthday, m.seconds)
          const past = date <= now
          results.push({ label: m.label, date, past })
        }

        return results
      }

      function renderMilestones(birthday) {
        const milestones = computeMilestones(birthday)
        const container = document.getElementById("milestones")

        const past = milestones.filter((m) => m.past)
        const future = milestones.filter((m) => !m.past)

        let html = "<h3>Milestones</h3>"

        for (const m of past) {
          html +=
            '<div class="milestone milestone-past">' +
            '<span class="milestone-label">' + m.label + "</span>" +
            '<span class="milestone-date">' + formatDate(m.date) + "</span>" +
            "</div>"
        }

        if (future.length > 0) {
          const next = future[0]
          html +=
            '<div class="milestone milestone-next">' +
            '<span class="milestone-label">Next: ' + next.label + "</span>" +
            '<span class="milestone-date">' + formatDate(next.date) + "</span>" +
            "</div>"
        }

        container.innerHTML = html
      }

      function init() {
        const params = new URLSearchParams(window.location.search)
        const dateInput = params.get("date")
        if (!dateInput) {
          return
        }
        document.getElementById("dateinput").value = dateInput
        const date = new Date(dateInput)
        if (date.getTime()) {
          update(date)
          renderMilestones(date)
          document.getElementById("output").style.display = "block"
          setInterval(() => {
            update(date)
          }, 1000)
        }
      }

      function handleSubmit(event) {
        event.preventDefault()

        const dateInput = document.getElementById("dateinput").value
        const errorElement = document.getElementById("error")

        if (!dateInput) {
          errorElement.textContent = "Please enter a date."
          errorElement.style.display = "block"
          return
        }

        const date = new Date(dateInput)
        if (date.getTime()) {
          const params = new URLSearchParams(window.location.search)
          params.set("date", dateInput)
          window.location.search = params.toString()
          update(date)
          renderMilestones(date)
          document.getElementById("output").style.display = "block"
          errorElement.style.display = "none"
        } else {
          errorElement.textContent = "Invalid date."
          errorElement.style.display = "block"
        }
      }

      function update(birthday) {
        const now = new Date()
        const diff = now.getTime() - birthday.getTime()
        const seconds = diff / 1000
        const hours = seconds / 3600
        const days = hours / 24
        const weeks = days / 7

        let years = now.getFullYear() - birthday.getFullYear()
        let months = now.getMonth() - birthday.getMonth()
        if (months < 0) {
          years--
          months += 12
        }
        if (now.getDate() < birthday.getDate()) {
          months--
          if (months < 0) {
            years--
            months += 12
          }
        }
        const totalMonths = years * 12 + months

        const percent = Math.min(100, (seconds / (LIFE_EXPECTANCY_YEARS * 365.25 * 86400)) * 100)
        document.getElementById("progress-label").textContent =
          percent.toFixed(1) + "% of average lifespan"
        document.getElementById("progress-bar").style.width = percent.toFixed(1) + "%"

        document.getElementById("age-summary").textContent =
          years + " years, " + months + " months old"
        document.getElementById("years").textContent = years
        document.getElementById("months").textContent = totalMonths
        document.getElementById("weeks").textContent = Math.floor(weeks).toLocaleString()
        document.getElementById("days").textContent = Math.floor(days).toLocaleString()
        document.getElementById("hours").textContent = Math.floor(hours).toLocaleString()
        document.getElementById("seconds").textContent = Math.floor(seconds).toLocaleString()
      }

      document.addEventListener("DOMContentLoaded", () => {
        init()
        document.getElementById("form").addEventListener("submit", handleSubmit)
      })
    </script>
    <script src="/shared/nav.js"></script>
  </body>
</html>
